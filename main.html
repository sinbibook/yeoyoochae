  <head>

바쁜 일상 속, 잠시 멈춰 숨을 고를 수 있는 곳. 여유채는 단순한 숙소가 아닌, 당신의 삶에 진짜 '쉼'을 선물하는 공간입니다.

</head>
  <body>
    <div class="main">
      <!-- header.html include -->
      <div id="header-container"></div>

      <!-- ===================== 1. HERO ===================== -->
      <!-- CUSTOM FIELD : 숙소소개 메인 소개 섹션 이미지 매핑 (동적생성) -->
      <section class="con-1-wrapper">
        <div class="con-1">
          <div class="bg">
            <div class="bg-slides" data-main-images>
              <!-- 동적 생성 (main-mapper.js) -->
            </div>
            <div class="bg-inner">
              <div class="frame-parent">
                <div class="frame-group">
                  <div class="prologue-wrapper">
                    <!-- 하드코딩, 매핑x -->
                    <h2 class="prologue">Prologue</h2>
                  </div>
                  <div class="frame-child"></div>
                </div>
                <div class="slider-arrows">
                  <img class="arrow-line arrow-prev" role="button" tabindex="0" aria-label="이전 슬라이드" loading="lazy" alt="" src="./public/Rectangle-37.svg" />
                  <h3 class="arrow-num arrow-num-current">01</h3>
                  <div class="arrow-divider"></div>
                  <h3 class="arrow-num arrow-num-total">00</h3>
                  <img class="arrow-line arrow-line-flip arrow-next" role="button" tabindex="0" aria-label="다음 슬라이드" loading="lazy" alt="" src="./public/Rectangle-37.svg" />
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- ===================== PROLOGUE (con-2) ===================== -->
      <section class="con-2">
        <img class="bg-icon" alt="" src="./public/bg1@2x.png" />
        <!-- CUSTOM FIELD : 숙소소개 소개 섹션 타이틀 매핑 -->
        <div class="prologue-title-wrapper" data-main-intro-title>
          <h1 class="prologue-title"></h1>
        </div>

        <div class="image-container">
          <div class="quote-container" data-main-intro-images>
            <!-- CUSTOM FIELD : 숙소소개 소개 섹션 이미지 매핑, 이미지 총4장 고정, 1,2번째 이미지 -->
            <div class="img1-parent">
              <img class="img1-icon" loading="lazy" alt="" src="" />
              <img class="img1-icon" loading="lazy" alt="" src="" />
            </div>
            <div class="frame-parent2">
              <div class="wrapper">
                <h1 class="h1">"</h1>
              </div>
              <!-- CUSTOM FIELD : 숙소소개 소개 섹션 설명 매핑 -->
              <div class="quote-content">
                <div class="muten-lol" data-main-intro-description></div>
              </div>
            </div>
          </div>
          <div class="img-r">
            <div class="image-overlay">
              <!-- CUSTOM FIELD : 숙소소개 소개 섹션 이미지 매핑, 이미지 총4장 고정, 3,4번째 이미지 -->
              <div class="image-overlay-child" data-main-intro-images></div>
              <img class="image-overlay-item" loading="lazy" alt="" src="" />
              <img class="image-overlay-inner" alt="" src="" />
            </div>
          </div>
        </div>

        <div class="img-r-parent">
          <div class="frame-wrapper">
            <!-- 숙소 영문명 매핑 -->
            <div class="gangreong-mutenrol-parent">
              <h2 class="gangreong-mutenrol" data-hero-property-name></h2>
            </div>
            <div class="con-3">
              <div class="description-components">
                <div class="txt-wrapper">
                  <!-- 하드코딩, 매핑x -->
                  <div class="txt">
                    <h2 class="room-preview">Room preview</h2>
                    <h3 class="h33">쾌적한 객실을 미리만나보세요</h3>
                    <a class="btn" href="./room.html" data-room-preview-link>
                      <h3 class="view-more">View More</h3>
                      <img class="btn-child" alt="" src="./public/Rectangle-8.svg" />
                    </a>
                  </div>
                </div>
                <!-- room preview section : 커스텀 영역 x / 룸 이미지 매핑 -->
                <div class="separator-components" data-room-images></div>
                <img class="description-components-child" loading="lazy" alt="" src="" />
                <div class="image-components">
                  <img class="image-components-child" loading="lazy" alt="" src="" />
                </div>
              </div>
              <div class="description-components2">
                <div class="description-components-item"></div>
                <div class="frame-container">
                  <div class="txt-container">
                    <!-- 하드코딩, 매핑x -->
                    <div class="txt2">
                      <h2 class="specials-preview">Specials preview</h2>
                      <h3 class="h34">다양한 부대시설 미리만나보세요</h3>
                      <a class="btn2" href="./facility.html" data-specials-preview-link>
                        <h3 class="view-more">View More</h3>
                        <img class="btn-child" alt="" src="./public/Rectangle-8.svg" />
                      </a>
                    </div>
                  </div>
                  <!-- specials preview section : 커스텀 영역 x / 부대시설 이미지 매핑 -->
                  <img class="frame-item" data-specials-images loading="lazy" alt="" src="" />
                  <img class="description-components-inner" loading="lazy" alt="" src="" />
                </div>
              </div>
              <div class="description-components3">
                <div class="txt-wrapper">
                  <!-- 하드코딩, 매핑x -->
                  <div class="txt3">
                    <h2 class="local-sights">Local sights</h2>
                    <h3 class="h35">주변 관광지 미리 만나보세요</h3>
                    <a class="btn3" href="./nearby-attractions.html">
                      <h3 class="view-more">View More</h3>
                      <img class="btn-child" alt="" src="./public/Rectangle-8.svg" />
                    </a>
                  </div>
                </div>
                <!-- local sights section : 커스텀 영역 x / 주변 관광지 이미지 매핑 -->
                <div class="separator-components" data-localsights-images></div>
                <img class="description-components-child" loading="lazy" alt="" src="" />
                <div class="image-components">
                  <img class="image-components-child" loading="lazy" alt="" src="" />
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- ===================== QUOTE ===================== -->
      <!-- CUSTOM FIELD : index closing 섹션 데이터 재사용 -->
      <section class="quote-section" data-closing-section>
        <img class="quote-bg" loading="lazy" alt="" src="" />
        <div class="quote-content">
          <b class="quote-title" data-closing-title></b>
          <b class="quote-body" data-closing-description></b>
        </div>
      </section>

      <!-- ===================== FOOTER ===================== -->
      <!-- footer.html include -->
      <div id="footer-container"></div>
    </div>

    <!-- Popup -->
    <div id="popup-container"></div>

    <!-- Scripts -->
    <script src="./js/common.js"></script>
    <script src="./js/common/scroll-reveal.js"></script>
    <script src="./js/pages/main.js"></script>

    <!-- Data Mapper -->
    <script src="./js/image-helpers.js"></script>
    <script src="./js/data-mapper/core/base-mapper.js"></script>
    <script src="./js/data-mapper/pages/header-footer-mapper.js"></script>
    <script src="./js/data-mapper/pages/main-mapper.js"></script>
    <script src="./js/preview-handler.js"></script>

    <!-- Header / Footer Loader -->
    <script src="./js/header-footer-loader.js"></script>

    <!-- Popup -->
    <script src="./js/popup.js"></script>
  </body>
</html>
