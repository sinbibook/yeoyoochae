<body>
    <div class="page">
      <!-- header.html include -->
      <div id="header-container"></div>
      <!-- ===================== 1. HERO ===================== -->
      <section class="hero">
        <!-- HOMEPAGE Property : 숙소명 매핑 -->
        <div class="hero-title" data-hero-property-name>
          <h1 class="hero-title-text"></h1>
        </div>
        <!-- ===================== 2. GALLERY ===================== -->
        <div class="gallery-section" data-gallery>
        <!-- CUSTOM FIELD : 홈 갤러리 섹션 이미지 매핑 -->
          <div class="gallery-track" data-gallery-image>
            <!-- 동적 생성 (index-mapper.js) -->
          </div>
        </div>

        <!-- ===================== 3. CON-2: SLIDER ===================== -->
        <div class="slider-section" data-hero-section>
          <!-- CUSTOM FIELD : 홈 메인 소개 섹션 이미지 매핑 -->
          <div class="slider-bg-wrap" data-hero-images>
            <!-- 동적 생성 (index-mapper.js) -->
          </div>
          <div class="slider-content">
            <!-- CUSTOM FIELD : 홈 메인 소개 섹션 설명 매핑 -->
            <div class="slider-heading" data-hero-description></div>
            <div class="slider-bottom">
              <!-- CUSTOM FIELD : 홈 메인 소개 섹션 타이틀 매핑 -->
              <h3 class="slider-subtitle" data-hero-title></h3>
              <div class="slider-arrows">
                <img class="arrow-line" loading="lazy" alt="" src="./images/Rectangle-37.svg" />
                <h3 class="arrow-num">01</h3>
                <div class="arrow-divider"></div>
                <h3 class="arrow-num">00</h3>
                <img class="arrow-line arrow-line-flip" loading="lazy" alt="" src="./images/Rectangle-37.svg" />
              </div>
            </div>
          </div>
        </section>
      </div>

      <!-- ===================== 4. CON-3: PROLOGUE ===================== -->
      <section class="prologue-section" data-essence-section>
        <img class="prologue-bg" alt="" src="./images/bg6@2x.png" />
        <div class="prologue-inner">
          <div class="prologue-text">
            <!-- CUSTOM FIELD : 홈 메인 핵심 메시지 섹션 설명 매핑  -->
            <div class="prologue-heading" data-essence-description></div>
            <!-- CUSTOM FIELD : 홈 메인 핵심 메시지 타이틀 매핑 -->
            <div class="prologue-desc" data-essence-title></div>
          </div>
          <div class="prologue-divider"></div>
        </div>
        <!-- CUSTOM FIELD : 홈 메인 핵심 메시지 이미지 매핑, 이미지는 총 3개 고정 롤링 -->
        <div class="prologue-main-wrap" data-essence-images>
          <!-- 동적 생성 (index-mapper.js) -->
        </div>
        <div class="prologue-thumbs">
          <!-- 동적 생성 (index-mapper.js) -->
        </div>
      </section>

      <!-- ===================== 5. ROOMVIEW ===================== -->
       <!-- room preview section : 커스텀 영역 x / 룸 정보 매핑 -->
      <section class="roomview-section" data-room-section>
        <!-- 하드코딩, 매핑 x -->
        <b class="roomview-title">Roomview</b>
        <div class="room-slider">
          <div class="room-slider-track">
            <!-- 동적 생성 (index-mapper.js) -->
          </div>
        </div>
      </section>

      <!-- ===================== 6. SPECIAL OFFERS ===================== -->
       <!-- facility section : 커스텀 영역 x / 부대시설 정보 매핑 -->
      <section class="special-section" data-facility-section>
        <img class="special-bg-img" alt="" src="./images/bg5@2x.png" />
        <div class="special-content">
          <!-- 하드코딩, 매핑x -->
          <b class="special-offers-label">Special offers</b>
          <!-- 컨텐츠 레이어 (문구 위에 겹침) -->
          <div class="special-overlay">
            <div class="special-left">
              <div class="specials-card-img-wrap">
                <div class="specials-card-img-border"></div>
                <!-- 동적 생성 (index-mapper.js) -->
              </div>
            </div>
            <div class="special-text-group">
              <!-- 하드코딩, 매핑x -->
              <b class="special-here-label">Special<br /> here</b>
              <div class="special-right">
                <div class="special-image">
                  <!-- 동적 생성 (index-mapper.js) -->
                  <div class="slide">
                    <div class="slide-dots">
                      <img class="dot-icon" loading="lazy" alt="" src="./images/Empty-Set1.svg" />
                      <img class="dot-icon dot-icon-flip" loading="lazy" alt="" src="./images/Empty-Set1.svg" />
                    </div>
                    <div class="bar-icon" aria-hidden="true"><div class="bar-fill"></div></div>
                  </div>
                </div>
                <!-- 슬라이드 인덱스에 맞춰 JS가 textContent와 href를 교체 -->
                <h3 class="specials-card-title" data-titles=""></h3>
                <div class="specials-card-body">
                  <div class="specials-card-desc" data-descs=""></div>
                  <a href="#" class="view-more-link view-more-link-sm" data-links="">
                    <h3 class="view-more-text">View More</h3>
                    <img class="view-more-line" loading="lazy" alt="" src="./images/Rectangle-8.svg" />
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- ===================== 8. QUOTE (CON-5) ===================== -->
      <section class="quote-section" data-closing-section>
        <!-- CUSTOM FIELD : 홈 메인 마무리 섹션 이미지 매핑 -->
        <img class="quote-bg" loading="lazy" alt="" src="" />
        <div class="quote-content">
          <!-- CUSTOM FIELD : 홈 메인 마무리 섹션 타이틀 매핑 -->
          <b class="quote-title" data-closing-title></b>
          <!-- CUSTOM FIELD : 홈 메인 마무리 섹션 설명 매핑 -->
          <b class="quote-body" data-closing-description></b>
        </div>
      </section>

      <!-- ===================== 9. FOOTER ===================== -->
      <!-- footer.html include -->
      <div id="footer-container"></div>

    </div>


    <!-- Popup -->
    <div id="popup-container"></div>

    <!-- Scripts -->
    <script src="js/common.js"></script>
    <script src="js/common/scroll-reveal.js"></script>
    <script src="js/pages/index.js"></script>

    <!-- Data Mapper -->
    <script src="js/image-helpers.js"></script>
    <script src="js/data-mapper/core/base-mapper.js"></script>
    <script src="js/data-mapper/pages/header-footer-mapper.js"></script>
    <script src="js/data-mapper/pages/index-mapper.js"></script>
    <script src="js/preview-handler.js"></script>

    <!-- Header / Footer Loader (header.html 로드 → 내부 스크립트 추출 실행 → HeaderFooterMapper 초기화) -->
    <script src="js/header-footer-loader.js"></script>

    <!-- Popup -->
    <script src="js/popup.js"></script>
