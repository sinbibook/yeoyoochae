            display: inline-block;
            padding: 14px 48px;
            background: var(--color-secondary, #658399);
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-family: var(--font-pretendard);
            font-size: 16px;
        }

        .error-button:hover {
            background: #5a7185;
            transform: translateY(-2px);
