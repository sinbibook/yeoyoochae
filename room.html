<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Stylesheets -->

⛰ 탁 트인 하늘과 고요한 산, 흐르는 강줄기 홍천의 자연 속 프라이빗 독채에서 누구의 방해도 없는 온전한 휴식을 경험하세요.

</head>
<body>
    <!-- direction 클래스: directions.css와 공통 헤더/hero 디자인 공유, room-page: room 전용 스타일 스코프 -->
    <div class="direction room-page">
      <!-- header.html include -->
      <div id="header-container"></div>

      <!-- ===================== HERO (공통 메인 롤링 이미지) ===================== -->
      <main class="content">
        <section class="con-2">
          <div class="bg2">
            <!-- CUSTOM FIELD : 객실 내부 이미지 매핑 (동적생성) -->
            <div class="bg-slides" data-room-hero-images>
              <!-- 동적 생성 (room-mapper.js) -->
            </div>
            <div class="bg-child">
              <div class="address-container-parent">
                <div class="address-container">
                  <div class="direction-info">
                    <!-- 하드코딩, 매핑x -->
                    <h2 class="direction2">Room</h2>
                  </div>
                  <div class="direction-divider"></div>
                </div>
                <div class="arrow-container">
                  <div class="arrow2">
                    <img class="arrow-child2 arrow-prev" role="button" tabindex="0" aria-label="이전 슬라이드" loading="lazy" alt="" src="./public/Rectangle-37.svg" />
                    <h3 class="h36 arrow-num-current">01</h3>
                    <div class="arrow-child3"></div>
                    <h3 class="h36 arrow-num-total">00</h3>
                    <img class="arrow-child4 arrow-next" role="button" tabindex="0" aria-label="다음 슬라이드" loading="lazy" alt="" src="./public/Rectangle-37.svg" />
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>

      <!-- ===================== ROOM INFO 섹션 (Room info + 큰 이미지 + 4개 썸네일) ===================== -->
      <section class="room-info-section">
        <div class="room-info-header">
          <!-- 하드코딩, 매핑x -->
          <h2 class="room-info-title">Room info</h2>
          <!-- 객실명 매핑 -->
          <h3 class="room-info-sub" data-room-name></h3>
        </div>
        <!-- 객실 이미지 매핑 (roomtype_interior 0번째) -->
        <div class="room-info-feature" data-room-images>
          <img class="room-info-feature-img" loading="lazy" alt="" src="" />
        </div>
        <!-- 객실 썸네일 이미지 매핑 (roomtype_interior 1~4번째) -->
        <div class="room-info-thumbs" data-room-images>
          <div class="room-info-thumb-wrap"><img class="room-info-thumb" loading="lazy" alt="" src="" /></div>
          <div class="room-info-thumb-wrap"><img class="room-info-thumb" loading="lazy" alt="" src="" /></div>
          <div class="room-info-thumb-wrap"><img class="room-info-thumb" loading="lazy" alt="" src="" /></div>
          <div class="room-info-thumb-wrap"><img class="room-info-thumb" loading="lazy" alt="" src="" /></div>
        </div>
      </section>

      <!-- ===================== ROOM 페이지 전용 컨텐츠 ===================== -->
      <main class="frame-main">
        <!-- 객실명 매핑 -->
        <h1 class="room-info-name" data-room-name></h1>
        <div class="bg-wrapper">
          <div class="bg4">
            <div class="bg-item"></div>
            <div class="rectangle-div"></div>
            <section class="frame-section">
              <div class="info-left-parent">
                <div class="info-left">
                  <div class="info-row">
                    <div class="info-bullet"></div>
                    <!-- 하드코딩, 매핑x -->
                    <h3 class="info-label">객실 정보</h3>
                    <!-- 객실 정보 매핑 -->
                    <div class="info-value" data-room-info></div>
                  </div>
                  <div class="info-row">
                    <div class="info-bullet"></div>
                    <!-- 하드코딩, 매핑x -->
                    <h3 class="info-label">객실 크기</h3>
                    <!-- 객실 크기 매핑 -->
                    <div class="info-value" data-room-size></div>
                  </div>
                  <div class="info-row">
                    <div class="info-bullet"></div>
                    <!-- 하드코딩, 매핑x -->
                    <h3 class="info-label info-label--multi">체크인/<br />체크아웃</h3>
                    <!-- 체크인/체크아웃 시간 매핑 -->
                    <div class="info-value" data-room-checkin-checkout></div>
                  </div>
                  <div class="info-row">
                    <div class="info-bullet"></div>
                    <!-- 하드코딩, 매핑x -->
                    <h3 class="info-label">어메니티</h3>
                    <!-- 어메니티 매핑 -->
                    <div class="info-value" data-room-amenities></div>
                  </div>
                  <div class="info-row">
                    <div class="info-bullet"></div>
                    <!-- 하드코딩, 매핑x -->
                    <h3 class="info-label">기준 인원</h3>
                    <!-- 기준 인원 매핑 -->
                    <div class="info-value" data-room-capacity></div>
                  </div>
                </div>
                <div class="info-right">
                  <div class="info-right-header">
                    <div class="info-bullet-wrap"><div class="info-bullet"></div></div>
                    <!-- 하드코딩, 매핑x -->
                    <h3 class="info-right-label">이용 안내</h3>
                  </div>
                  <!-- 이용 안내 매핑 -->
                  <div class="info-right-body" data-room-guide></div>
                </div>
              </div>
            </section>
          </div>
        </div>
      </main>

      <!-- ===================== CON3 (Roomview - 4개 카테고리 + 미리보기) 별도 섹션 ===================== -->
      <section class="con3-parent">
        <!-- CUSTOM FIELD : 객실설정 이미지 컨셉 및 외경 매핑 -->
        <div class="con3" data-room-concept-images>
          <div class="img13"><h1 class="in-room" data-room-concept-label></h1></div>
          <div class="img22"><h1 class="h13" data-room-concept-label></h1></div>
          <div class="img4"><h1 class="spa" data-room-concept-label></h1></div>
          <div class="img42"><h1 class="poolvilla" data-room-concept-label></h1></div>
        </div>

        <!-- Roomview 슬라이더 -->
        <div class="roomview-slider-wrap">
          <b class="roomview-title">Roomview</b>
          <div class="room-slider">
            <div class="room-slider-track">
              <!-- 동적 생성 (room-mapper.js) -->
            </div>
          </div>
        </div>
      </section>

      <!-- footer.html include -->
      <div id="footer-container"></div>
    </div>

    <!-- Scripts -->
    <script src="./js/common.js"></script>
    <script src="./js/common/scroll-reveal.js"></script>
    <!-- Hero 슬라이더 (directions.js의 initCon2HeroSlider 사용) -->
    <script src="./js/pages/directions.js"></script>
    <!-- Room 페이지 슬라이더 -->
    <script src="./js/pages/room.js"></script>

    <!-- Data Mapper -->
    <script src="./js/image-helpers.js"></script>
    <script src="./js/data-mapper/core/base-mapper.js"></script>
    <script src="./js/data-mapper/pages/header-footer-mapper.js"></script>
    <script src="./js/data-mapper/pages/room-mapper.js"></script>
    <script src="./js/preview-handler.js"></script>

    <!-- Header / Footer Loader -->
    <script src="./js/header-footer-loader.js"></script>
</body>
</html>
